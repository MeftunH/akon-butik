# Local development stack for Akon Butik.
# Run: docker compose -f infra/docker/docker-compose.dev.yml up -d
#
# Services bind to 127.0.0.1 only — never expose Postgres or Redis on a public interface.

name: akonbutik-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: akonbutik_app
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: akonbutik_dev
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U akonbutik_app -d akonbutik_dev']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - '127.0.0.1:1025:1025' # SMTP
      - '127.0.0.1:8025:8025' # web UI

volumes:
  postgres_data:
  redis_data:
